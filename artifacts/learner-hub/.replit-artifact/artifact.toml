kind = "web"
previewPath = "/"
title = "Learner Hub"
version = "1.0.0"
id = "artifacts/learner-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21399

[services.development]
run = "pnpm --filter @workspace/learner-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/learner-hub", "run", "build" ]
publicDir = "artifacts/learner-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21399"
BASE_PATH = "/"
